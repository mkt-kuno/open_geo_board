name: Build and Release

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get short hash
        id: hash
        run: echo "short_hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Install Arduino CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          echo "$HOME/.arduino-cli/bin" >> $GITHUB_PATH

      - name: Configure Arduino CLI
        run: |
          arduino-cli config init
          arduino-cli core update-index
          arduino-cli core install arduino:renesas_uno:unor4nano

      - name: Install libraries
        run: |
          arduino-cli lib install "https://github.com/bogde/HX711"
          arduino-cli lib install ADS1115_WE
          arduino-cli lib install DFRobot_GP8403
          arduino-cli lib install ModbusRTUSlave

      - name: Build
        run: |
          arduino-cli compile --board arduino:renesas_uno:unor4nano --output-dir ./build .

      - name: Rename binaries with short hash
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          cd build
          for f in *.bin; do
            base="${f%.bin}"
            mv "$f" "${base}_${{ steps.hash.outputs.short_hash }}.bin"
          done

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.hash.outputs.short_hash }}
          name: Build ${{ steps.hash.outputs.short_hash }}
          body: |
            Automated build from commit `${{ github.sha }}`
            Short hash: `${{ steps.hash.outputs.short_hash }}`
          files: build/*.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
