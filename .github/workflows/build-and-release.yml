name: Build and Release Firmware

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install Arduino core and libraries
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:renesas_uno
          arduino-cli lib install "HX711" "ADS1115_WE" "DFRobot_GP8403" "ModbusRTUSlave"

      - name: Compile firmware
        run: arduino-cli compile --board arduino:renesas_uno:unor4nano --output-dir ./build .

      - name: Set release tag
        id: vars
        run: echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release and upload binaries
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.vars.outputs.tag }}
        run: |
          artifacts=()
          for artifact in build/*.bin build/*.hex build/*.elf; do
            if [ -e "$artifact" ]; then
              artifacts+=("$artifact")
            fi
          done

          if [ "${#artifacts[@]}" -eq 0 ]; then
            echo "No firmware artifacts (.bin/.hex/.elf) found in ./build"
            exit 1
          fi

          if ! gh release view "$RELEASE_TAG" > /dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --title "Firmware Build $RELEASE_TAG" \
              --notes "Automated firmware build for $RELEASE_TAG"
          fi
          gh release upload "$RELEASE_TAG" "${artifacts[@]}" --clobber
